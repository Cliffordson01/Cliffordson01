  <text x="82" y="108" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" fill="#8fa8b8">→  Multiple environments in production — different workloads, uptime SLAs,</text>
  <text x="82" y="124" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" fill="#8fa8b8">     release cycles — managed by one person, zero ops team.</text>

