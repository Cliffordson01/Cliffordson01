<svg xmlns="http://www.w3.org/2000/svg" width="860" height="340" viewBox="0 0 860 340">
  <rect width="860" height="340" rx="12" fill="#1b2932" stroke="#2d4050" stroke-width="1.5"/>
  <rect width="860" height="52" rx="12" fill="#162229"/>
  <rect y="40" width="860" height="12" fill="#162229"/>

  <rect x="20" y="14" width="26" height="22" rx="4" fill="#263d4a"/>
  <text x="33" y="29" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#8a9ba8" text-anchor="middle" font-weight="600">02</text>

  <text x="56" y="30" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13.5" fill="#d3b58e" font-weight="700" letter-spacing="0.5">MULTI-SYSTEM API INTEGRATION LAYER</text>

  <rect x="20" y="60" width="40" height="18" rx="3" fill="#263d4a"/>
  <text x="40" y="73" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8a9ba8" text-anchor="middle">REST</text>
  <rect x="65" y="60" width="72" height="18" rx="3" fill="#263d4a"/>
  <text x="101" y="73" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8a9ba8" text-anchor="middle">Webhooks</text>
  <rect x="142" y="60" width="100" height="18" rx="3" fill="#263d4a"/>
  <text x="192" y="73" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8a9ba8" text-anchor="middle">Normalization</text>
  <rect x="247" y="60" width="100" height="18" rx="3" fill="#263d4a"/>
  <text x="297" y="73" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8a9ba8" text-anchor="middle">Error Isolation</text>
  <rect x="352" y="60" width="64" height="18" rx="3" fill="#263d4a"/>
  <text x="384" y="73" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8a9ba8" text-anchor="middle">Logging</text>

  <text x="20" y="108" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" fill="#6b8899">Problem</text>
  <text x="82" y="108" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" fill="#8fa8b8">→  Multiple external systems — different APIs, auth models, schemas —</text>
  <text x="82" y="124" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" fill="#8fa8b8">     needing real-time sync without one failure bringing down the rest.</text>

  <line x1="20" y1="140" x2="840" y2="140" stroke="#263d4a" stroke-width="1"/>

  <rect x="20" y="150" width="90" height="20" rx="3" fill="#1f3040"/>
  <text x="65" y="164" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#d3b58e" text-anchor="middle" font-weight="600">RECEIVE</text>
  <text x="122" y="164" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" fill="#a8bfcc">→  Webhook receivers + polling jobs — real-time and batch</text>

  <rect x="20" y="178" width="90" height="20" rx="3" fill="#1f3040"/>
  <text x="65" y="192" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#d3b58e" text-anchor="middle" font-weight="600">NORMALIZE</text>
  <text x="122" y="192" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" fill="#a8bfcc">→  Translation layer to unify data models across systems</text>

  <rect x="20" y="206" width="90" height="20" rx="3" fill="#1f3040"/>
  <text x="65" y="220" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#d3b58e" text-anchor="middle" font-weight="600">ISOLATE</text>
  <text x="122" y="220" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" fill="#a8bfcc">→  Error boundaries — a failing integration stays contained</text>

  <rect x="20" y="234" width="90" height="20" rx="3" fill="#1f3040"/>
  <text x="65" y="248" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#d3b58e" text-anchor="middle" font-weight="600">LOG</text>
  <text x="122" y="248" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" fill="#a8bfcc">→  Centralized logging: API calls, responses, retries</text>

  <rect x="20" y="262" width="90" height="20" rx="3" fill="#1f3040"/>
  <text x="65" y="276" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#d3b58e" text-anchor="middle" font-weight="600">SCALE</text>
  <text x="122" y="276" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" fill="#a8bfcc">→  Modular — add new integrations without refactoring</text>

  <line x1="20" y1="294" x2="840" y2="294" stroke="#263d4a" stroke-width="1"/>
  <text x="20" y="318" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" fill="#6b8899">Result</text>
  <text x="72" y="318" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" fill="#d3b58e" font-weight="600">→  Decoupled integration backbone that handles edge cases without drama.</text>
</svg>
